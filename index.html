<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEAI - Aliansi Edukasi Astronomy Indonesia</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#000814;overflow:hidden;color:white;}

body::before{
content:"";position:fixed;width:100%;height:100%;
background:
radial-gradient(circle at 20% 30%, #001d3d, transparent 40%),
radial-gradient(circle at 80% 70%, #001233, transparent 40%),
radial-gradient(circle at center, #000814 0%, #000000 70%);
z-index:-2;
}

body::after{
content:"";position:fixed;width:100%;height:100%;
background-image:
radial-gradient(#00f2ff 1px, transparent 1px),
radial-gradient(#00c3ff 1px, transparent 1px);
background-size:60px 60px,100px 100px;
animation:stars 60s linear infinite;
opacity:0.2;
z-index:-1;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* SPLASH */
.splash{
position:fixed;width:100%;height:100vh;
display:flex;align-items:center;justify-content:center;
background:#000814;z-index:10;
transition:opacity 1.5s ease,visibility 1.5s ease;
}
.splash.hide{opacity:0;visibility:hidden;}

.atom{position:relative;width:250px;height:250px;}
.center-text{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:32px;font-weight:900;
color:#00f2ff;
text-shadow:0 0 10px #00f2ff,0 0 20px #00c3ff,0 0 40px #0096ff;
}

.orbit{
position:absolute;width:100%;height:100%;
border:2px solid rgba(0,242,255,0.6);
border-radius:50%;
animation:rotate 6s linear infinite;
box-shadow:0 0 20px #00f2ff;
}
.orbit:nth-child(2){transform:rotate(60deg);animation-duration:8s;}
.orbit:nth-child(3){transform:rotate(-60deg);animation-duration:10s;}

.electron{
position:absolute;width:12px;height:12px;
background:#00f2ff;border-radius:50%;
top:-6px;left:50%;transform:translateX(-50%);
box-shadow:0 0 10px #00f2ff,0 0 20px #00c3ff,0 0 40px #0096ff;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* FORM */
.form-section{
display:none;padding:30px 20px;
max-width:500px;margin:auto;
animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

h1{
text-align:center;font-size:28px;margin-bottom:10px;
background:linear-gradient(90deg,#00f2ff,#9d4edd);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;font-size:14px;
opacity:0.7;margin-bottom:30px;
}

input,textarea{
width:100%;padding:12px;margin-bottom:15px;
border-radius:12px;
border:1px solid rgba(0,242,255,0.3);
background:rgba(0,20,40,0.6);
color:white;outline:none;
}

textarea{resize:none;}

.status-buttons{
display:grid;grid-template-columns:1fr 1fr;
gap:10px;margin-bottom:15px;
}

.status-buttons button{
padding:12px;border-radius:12px;
border:1px solid rgba(0,242,255,0.4);
background:transparent;color:#00f2ff;
cursor:pointer;transition:0.3s;
}
.status-buttons button.active,
.status-buttons button:hover{
background:#00f2ff;color:black;
box-shadow:0 0 15px #00f2ff;
}

.submit-btn{
width:100%;padding:15px;
border:none;border-radius:30px;
background:linear-gradient(90deg,#00f2ff,#9d4edd);
font-weight:700;cursor:pointer;
margin-top:10px;
}

footer{text-align:center;margin-top:30px;font-size:12px;opacity:0.5;}
</style>
</head>

<body>

<div class="splash" id="splash">
<div class="atom">
<div class="center-text">AEAI</div>
<div class="orbit"><div class="electron"></div></div>
<div class="orbit"><div class="electron"></div></div>
<div class="orbit"><div class="electron"></div></div>
</div>
</div>

<div class="form-section" id="formSection">
<h1>AEAI Community</h1>
<div class="subtitle">Aliansi Edukasi Astronomy Indonesia • Join The Galaxy</div>

<input type="text" id="nama" placeholder="Nama Lengkap">
<input type="number" id="umur" placeholder="Umur">

<div class="status-buttons">
<button onclick="setStatus(this)">Pelajar</button>
<button onclick="setStatus(this)">Mahasiswa</button>
<button onclick="setStatus(this)">Pekerja</button>
<button onclick="setStatus(this)">Lainnya</button>
</div>

<textarea rows="3" id="alasan" placeholder="Alasan Bergabung"></textarea>
<textarea rows="3" id="pengetahuan" placeholder="Pengetahuan Astronomi"></textarea>
<input type="text" id="sosmed" placeholder="Username Sosial Media">

<button class="submit-btn" onclick="kirimWA()">Kirim Pendaftaran 🚀</button>

<footer>© 2026 AEAI • Explore The Universe</footer>
</div>

<script>
let statusTerpilih="";

function setStatus(btn){
document.querySelectorAll('.status-buttons button')
.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
statusTerpilih=btn.innerText;
}

function kirimWA(){
let nama=document.getElementById("nama").value;
let umur=document.getElementById("umur").value;
let alasan=document.getElementById("alasan").value;
let pengetahuan=document.getElementById("pengetahuan").value;
let sosmed=document.getElementById("sosmed").value;

let pesan=`Pendaftaran AEAI%0A
Nama: ${nama}%0A
Umur: ${umur}%0A
Status: ${statusTerpilih}%0A
Alasan: ${alasan}%0A
Pengetahuan: ${pengetahuan}%0A
Sosial Media: ${sosmed}`;

window.open(`https://wa.me/6282295561182?text=${pesan}`,'_blank');
}

setTimeout(()=>{
document.getElementById("splash").classList.add("hide");
document.getElementById("formSection").style.display="block";
document.body.style.overflow="auto";
},4000);
</script>

</body>
  </html>
